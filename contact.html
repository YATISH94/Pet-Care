<!DOCTYPE html>
<html>

<head>

<title>PetCare - Contact</title>

<link rel="stylesheet" href="style.css">

<!-- Google Tag Manager -->
<script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','GTM-T4KJ82GX');</script>

</head>

<body>

<!-- GTM (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T4KJ82GX"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>


<header>

<h1>PetCare</h1>

<nav>

<a href="index.html"
onclick="trackEvent('navigation_click',{page:'home'})">Home</a>

<a href="about.html"
onclick="trackEvent('navigation_click',{page:'about'})">About</a>

<a href="services.html"
onclick="trackEvent('navigation_click',{page:'services'})">Services</a>

<a href="blog.html"
onclick="trackEvent('navigation_click',{page:'blog'})">Blog</a>

<a href="contact.html"
onclick="trackEvent('navigation_click',{page:'contact'})">Contact</a>

</nav>

</header>



<!-- CONTACT FORM -->

<section class="section">

<h2>Contact Us</h2>

<form id="contactForm">

<input type="text"
placeholder="Your Name"
required
onfocus="trackEvent('form_start',{field:'name'})"
style="padding:10px;width:250px">

<br><br>

<input type="email"
placeholder="Your Email"
required
onfocus="trackEvent('form_start',{field:'email'})"
style="padding:10px;width:250px">

<br><br>

<textarea
placeholder="Your Message"
required
onfocus="trackEvent('form_start',{field:'message'})"
style="padding:10px;width:250px;height:100px"></textarea>

<br><br>

<button type="submit" class="btn">
Submit
</button>

</form>


<!-- SUCCESS MESSAGE -->

<div id="successMessage" style="display:none; margin-top:20px; color:green; font-size:18px;">
✅ Thank you! Your form has been submitted successfully.
</div>

</section>



<footer>
<p>© 2026 PetCare. All rights reserved.</p>
</footer>



<script src="script.js"></script>



<!-- FORM HANDLING SCRIPT -->

<script>

document.getElementById("contactForm").addEventListener("submit", function(e){

e.preventDefault();  // stop page reload

// fire GA4 event
trackEvent('contact_form_submit',{form_name:'contact_form'});

// hide form
this.style.display = "none";

// show success message
document.getElementById("successMessage").style.display = "block";

});

</script>



<!-- GLOBAL EVENTS -->

<script>

/* Outbound link tracking */

document.querySelectorAll("a").forEach(link=>{

if(link.hostname !== window.location.hostname){

link.addEventListener("click",()=>{
gtag('event','outbound_click',{
link_url:link.href
});
});

}

});


/* Time on page */

setTimeout(function(){

gtag('event','engaged_15_seconds',{
page_location: window.location.pathname
});

},15000);

</script>


</body>
</html>
